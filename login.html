<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Guia do Suporte MP</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e8690b'/><text y='.9em' font-size='80' x='10'>🛠</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #111111;
      --surface:     #1b1b1b;
      --border:      #2e2e2e;
      --orange:      #e8690b;
      --orange-dim:  #c45508;
      --orange-glow: #ff8c3a;
      --text:        #e2e2e2;
      --text-muted:  #888888;
      --radius:      10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 15px;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: var(--orange);
    }

    button {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button:hover { background: var(--orange-dim); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      background: #3a1a00;
      border: 1px solid #7a3000;
      border-radius: 6px;
      color: var(--orange-glow);
      font-size: 13px;
      padding: 10px 12px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛠</div>
      <div class="logo-text">
        Guia do Suporte MP
        <div class="logo-sub">Acesso restrito</div>
      </div>
    </div>

    <h2>Entrar</h2>

    <form id="loginForm">
      <label for="username">Usuário</label>
      <input id="username" type="text" autocomplete="username" autofocus />

      <label for="password">Senha</label>
      <input id="password" type="password" autocomplete="current-password" />

      <button type="submit" id="btn">Entrar</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('btn');
    const err  = document.getElementById('error');

    const redirect = new URLSearchParams(location.search).get('redirect') || '/';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando…';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = redirect;
        } else {
          const data = await res.json();
          err.textContent = data.error || 'Erro ao fazer login.';
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Erro de conexão. Tente novamente.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
