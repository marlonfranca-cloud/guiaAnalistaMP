<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guia do Suporte MP</title>
  <style> 
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
    :root {
      --bg:         #111111;
      --surface:    #1b1b1b;
      --surface2:   #242424;
      --border:     #2e2e2e;
      --orange:     #e8690b;
      --orange-dim: #c45508;
      --orange-glow:#ff8c3a;
      --orange-soft:#3a1a00;
      --text:       #e2e2e2;
      --text-muted: #888888;
      --text-dim:   #555555;
      --radius:     10px;
      --radius-sm:  6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    a { color: var(--orange-glow); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    header h1 span {
      color: var(--orange);
    }

    /* ── Search ── */
    .search-wrap {
      margin-left: auto;
      position: relative;
    }

    .search-wrap input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px 7px 34px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--orange);
    }

    .search-wrap input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
    }

    /* ── Tabs ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }

    nav::-webkit-scrollbar { height: 3px; }
    nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      padding: 14px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--orange-glow);
      border-bottom-color: var(--orange);
    }

    .tab-icon { font-size: 15px; }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 28px 24px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Section Header ── */
    .section-header {
      margin-bottom: 22px;
    }

    .section-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .section-header p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .count-badge {
      display: inline-block;
      background: var(--orange-soft);
      color: var(--orange-glow);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Cards Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--orange-dim);
      box-shadow: 0 0 0 1px var(--orange-dim), 0 4px 20px rgba(0,0,0,0.4);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-icon {
      width: 38px;
      height: 38px;
      background: var(--orange-soft);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .card-title-wrap { flex: 1; min-width: 0; }

    .card-title {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 14px;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 500;
    }

    .tag-default {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .tag-orange {
      background: var(--orange-soft);
      color: var(--orange-glow);
    }

    .tag-green {
      background: #0d2b1a;
      color: #4ade80;
    }

    .tag-red {
      background: #2b0d0d;
      color: #f87171;
    }

    .tag-blue {
      background: #0d1e2b;
      color: #60a5fa;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      border: none;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--orange);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--orange-glow);
      text-decoration: none;
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--border);
      color: var(--text);
      text-decoration: none;
    }

    /* ── Contatos especial ── */
    .contact-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--orange-soft);
      border: 2px solid var(--orange-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--orange-glow);
      flex-shrink: 0;
    }

    .contact-field {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .contact-field:last-child { margin-bottom: 0; }
    .contact-field .fi { font-size: 13px; }

    /* ── Passos (Processos) ── */
    .steps-list {
      list-style: none;
      margin-top: 8px;
    }

    .steps-list li {
      display: flex;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 7px;
      align-items: flex-start;
    }

    .step-num {
      background: var(--orange-soft);
      color: var(--orange-glow);
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Empty / Loading ── */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .state-msg .icon { font-size: 36px; margin-bottom: 12px; }
    .state-msg p { font-size: 14px; }

    /* ── Divider label ── */
    .divider-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      nav { padding: 0 16px; }
      main { padding: 20px 16px; }
      .search-wrap input { width: 150px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo-icon">🛠</div>
    <h1>Guia de <span>Suporte</span></h1>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar..." oninput="filterCards()" />
    </div>
  </header>

  <!-- Tabs -->
  <nav>
    <button class="tab-btn active" onclick="loadTab('sistemas')" data-tab="sistemas">
      <span class="tab-icon">🖥</span> Sistemas
    </button>
    <button class="tab-btn" onclick="loadTab('processos')" data-tab="processos">
      <span class="tab-icon">⚙️</span> Processos
    </button>
    <button class="tab-btn" onclick="loadTab('scripts')" data-tab="scripts">
      <span class="tab-icon">📜</span> Scripts
    </button>
    <button class="tab-btn" onclick="loadTab('planilhas')" data-tab="planilhas">
      <span class="tab-icon">📊</span> Planilhas
    </button>
    <button class="tab-btn" onclick="loadTab('contatos')" data-tab="contatos">
      <span class="tab-icon">📞</span> Contatos úteis
    </button>
  </nav>

  <!-- Main -->
  <main id="main">
    <div class="state-msg"><div class="icon">⏳</div><p>Carregando...</p></div>
  </main>

  <footer>Guia do Suporte — uso interno</footer>
</div>

<script>
  // ── State ──
  let currentTab = 'sistemas';
  let allItems = [];

  // ── Tab loading ──
  function loadTab(tab) {
    currentTab = tab;

    // Update active tab button
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });

    // Clear search
    document.getElementById('searchInput').value = '';

    setLoading();
    fetch(`data/${tab}.json`)
      .then(r => {
        if (!r.ok) throw new Error('Arquivo não encontrado');
        return r.json();
      })
      .then(data => {
        allItems = data.items || [];
        renderTab(tab, data);
      })
      .catch(err => {
        setError(err.message);
      });
  }

  function setLoading() {
    document.getElementById('main').innerHTML =
      `<div class="state-msg"><div class="icon">⏳</div><p>Carregando...</p></div>`;
  }

  function setError(msg) {
    document.getElementById('main').innerHTML =
      `<div class="state-msg"><div class="icon">⚠️</div><p>${msg}</p></div>`;
  }

  // ── Render dispatcher ──
  function renderTab(tab, data) {
    const main = document.getElementById('main');
    const items = data.items || [];

    const descriptions = {
      sistemas:  'Sistemas e ferramentas utilizados pelo time.',
      processos: 'Processos e fluxos de trabalho padronizados.',
      scripts:   'Regras de negócio aplicáveis aos clientes.',
      planilhas: 'Planilhas e templates para consulta e uso.',
      contatos:  'Pessoas e canais de contato importantes.'
    };

    const icons = {
      sistemas:  '🖥',
      processos: '⚙️',
      scripts:   '📜',
      planilhas: '📊',
      contatos:  '📞'
    };

    const labels = {
      sistemas:  'Sistemas',
      processos: 'Processos',
      scripts:   'Regras de negócio',
      planilhas: 'Planilhas',
      contatos:  'Contatos úteis'
    };

    // Group items by category if available
    const hasCategories = items.some(i => i.categoria);
    let html = `
      <div class="section-header">
        <h2>${icons[tab]} ${labels[tab]} <span class="count-badge" id="countBadge">${items.length}</span></h2>
        <p>${data.descricao || descriptions[tab]}</p>
      </div>
    `;

    if (items.length === 0) {
      html += `<div class="state-msg"><div class="icon">📭</div><p>Nenhum item cadastrado ainda.</p></div>`;
      main.innerHTML = html;
      return;
    }

    if (hasCategories) {
      const groups = {};
      items.forEach(item => {
        const cat = item.categoria || 'Geral';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
      });

      for (const [cat, groupItems] of Object.entries(groups)) {
        html += `<div class="divider-label">${cat}</div>`;
        html += `<div class="cards-grid" data-group="${cat}">`;
        groupItems.forEach(item => {
          html += renderCard(tab, item);
        });
        html += `</div>`;
      }
    } else {
      html += `<div class="cards-grid">`;
      items.forEach(item => {
        html += renderCard(tab, item);
      });
      html += `</div>`;
    }

    main.innerHTML = html;
  }

  // ── Card renderers by tab ──
  function renderCard(tab, item) {
    switch(tab) {
      case 'sistemas':  return cardSistema(item);
      case 'processos': return cardProcesso(item);
      case 'scripts':   return cardScript(item);
      case 'planilhas': return cardPlanilha(item);
      case 'contatos':  return cardContato(item);
      default: return '';
    }
  }

  function cardSistema(item) {
    const statusTag = item.status === 'Ativo'
      ? `<span class="tag tag-green">${item.status}</span>`
      : item.status === 'Inativo'
        ? `<span class="tag tag-red">${item.status}</span>`
        : item.status
          ? `<span class="tag tag-default">${item.status}</span>`
          : '';

    const linkBtn = item.url
      ? `<a class="btn btn-primary" href="${item.url}" target="_blank">🔗 Acessar</a>`
      : '';

    const respTag = item.responsavel
      ? `<span class="tag tag-default">👤 ${item.responsavel}</span>`
      : '';

    return `
    <div class="card" data-search="${searchText(item)}">
      <div class="card-top">
        <div class="card-icon">🖥</div>
        <div class="card-title-wrap">
          <div class="card-title">${item.nome}</div>
          ${item.tipo ? `<div class="card-subtitle">${item.tipo}</div>` : ''}
        </div>
      </div>
      ${item.descricao ? `<p class="card-desc">${item.descricao}</p>` : ''}
      <div class="card-meta">
        ${statusTag}
        ${respTag}
        ${item.ambiente ? `<span class="tag tag-blue">${item.ambiente}</span>` : ''}
      </div>
      ${linkBtn ? `<div class="card-actions">${linkBtn}</div>` : ''}
    </div>`;
  }

  function cardProcesso(item) {
    const stepsHtml = item.passos && item.passos.length
      ? `<ul class="steps-list">${item.passos.map((p, i) =>
          `<li><span class="step-num">${i+1}</span><span>${p}</span></li>`
        ).join('')}</ul>`
      : '';

    const linkBtn = item.link
      ? `<a class="btn btn-primary" href="${item.link}" target="_blank">📄 Ver doc</a>`
      : '';

    return `
    <div class="card" data-search="${searchText(item)}">
      <div class="card-top">
        <div class="card-icon">⚙️</div>
        <div class="card-title-wrap">
          <div class="card-title">${item.nome}</div>
          ${item.categoria ? `<div class="card-subtitle">${item.categoria}</div>` : ''}
        </div>
      </div>
      ${item.descricao ? `<p class="card-desc">${item.descricao}</p>` : ''}
      ${stepsHtml}
      ${linkBtn ? `<div class="card-actions" style="margin-top:12px">${linkBtn}</div>` : ''}
    </div>`;
  }

  function cardScript(item) {
    const langColors = {
      'Python': 'tag-blue',
      'Bash': 'tag-green',
      'PowerShell': 'tag-blue',
      'JavaScript': 'tag-orange',
      'SQL': 'tag-orange',
    };
    const langTag = item.linguagem
      ? `<span class="tag ${langColors[item.linguagem] || 'tag-default'}">${item.linguagem}</span>`
      : '';

    const linkBtn = item.link
      ? `<a class="btn btn-primary" href="${item.link}" target="_blank">⬇️ Download</a>`
      : '';

    return `
    <div class="card" data-search="${searchText(item)}">
      <div class="card-top">
        <div class="card-icon">📜</div>
        <div class="card-title-wrap">
          <div class="card-title">${item.nome}</div>
          ${item.autor ? `<div class="card-subtitle">por ${item.autor}</div>` : ''}
        </div>
      </div>
      ${item.descricao ? `<p class="card-desc">${item.descricao}</p>` : ''}
      <div class="card-meta">
        ${langTag}
        ${item.uso ? `<span class="tag tag-default">${item.uso}</span>` : ''}
      </div>
      ${linkBtn ? `<div class="card-actions">${linkBtn}</div>` : ''}
    </div>`;
  }

  function cardPlanilha(item) {
    const linkBtn = item.link
      ? `<a class="btn btn-primary" href="${item.link}" target="_blank">📂 Abrir</a>`
      : '';

    return `
    <div class="card" data-search="${searchText(item)}">
      <div class="card-top">
        <div class="card-icon">📊</div>
        <div class="card-title-wrap">
          <div class="card-title">${item.nome}</div>
          ${item.atualizado ? `<div class="card-subtitle">Atualizado: ${item.atualizado}</div>` : ''}
        </div>
      </div>
      ${item.descricao ? `<p class="card-desc">${item.descricao}</p>` : ''}
      <div class="card-meta">
        ${item.formato ? `<span class="tag tag-green">${item.formato}</span>` : ''}
        ${item.responsavel ? `<span class="tag tag-default">👤 ${item.responsavel}</span>` : ''}
      </div>
      ${linkBtn ? `<div class="card-actions">${linkBtn}</div>` : ''}
    </div>`;
  }

  function cardContato(item) {
    const initials = item.nome.split(' ').slice(0,2).map(w => w[0]).join('').toUpperCase();

    return `
    <div class="card" data-search="${searchText(item)}">
      <div class="card-top">
        <div class="contact-avatar">${initials}</div>
        <div class="card-title-wrap">
          <div class="card-title">${item.nome}</div>
          ${item.cargo ? `<div class="card-subtitle">${item.cargo}</div>` : ''}
        </div>
      </div>
      ${item.departamento ? `<div class="card-meta"><span class="tag tag-orange">${item.departamento}</span></div>` : ''}
      <div>
        ${item.email ? `<div class="contact-field"><span class="fi">📧</span><a href="mailto:${item.email}">${item.email}</a></div>` : ''}
        ${item.telefone ? `<div class="contact-field"><span class="fi">📱</span><span>${item.telefone}</span></div>` : ''}
        ${item.slack ? `<div class="contact-field"><span class="fi">💬</span><span>${item.slack}</span></div>` : ''}
        ${item.observacao ? `<div class="contact-field" style="margin-top:8px;font-style:italic"><span class="fi">ℹ️</span><span>${item.observacao}</span></div>` : ''}
      </div>
    </div>`;
  }

  // ── Search ──
  function searchText(item) {
    return Object.values(item).join(' ').toLowerCase();
  }

  function filterCards() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const cards = document.querySelectorAll('.card');
    let visible = 0;
    cards.forEach(card => {
      const match = !query || card.dataset.search.includes(query);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });

    // Update count badge
    const badge = document.getElementById('countBadge');
    if (badge) badge.textContent = visible;

    // Show/hide empty groups
    document.querySelectorAll('[data-group]').forEach(grid => {
      const anyVisible = [...grid.querySelectorAll('.card')].some(c => c.style.display !== 'none');
      grid.style.display = anyVisible ? '' : 'none';
      const label = grid.previousElementSibling;
      if (label && label.classList.contains('divider-label')) {
        label.style.display = anyVisible ? '' : 'none';
      }
    });
  }

  // ── Init ──
  loadTab('sistemas');
</script>
</body>
</html>
